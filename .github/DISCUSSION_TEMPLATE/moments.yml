title: "New Moment"
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Share media or text that creates useful context inside the governance sandbox.

        A good Moment is simple:
        - choose one domain
        - share the media or text
        - explain why it matters
        - select the alignment principles that help interpret it responsibly

        Labels are applied automatically from the form fields below.
  - type: textarea
    id: insight
    attributes:
      label: Insight
      description: Explain the context in plain language. Why does this matter? What does it show or help people imagine?
      placeholder: This Moment helps people see...
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Link
      description: A URL to a video, article, image, document, or other resource. Leave blank if your Moment is text-only.
      placeholder: https://...
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      description: Which single domain best fits this Moment?
      options:
        - Economy
        - Employment
        - Education
        - Ecology
    validations:
      required: true
  - type: checkboxes
    id: principles
    attributes:
      label: Principles
      description: Select the alignment principles that help interpret this Moment and avoid displacement risks.
      options:
        - label: GMT
        - label: ICV
        - label: IIA
        - label: ICI
  - type: input
    id: display_name
    attributes:
      label: Display Name
      description: Optional. Leave blank if you want the app to show your GitHub username.
      placeholder: Anonymous or your preferred public name
